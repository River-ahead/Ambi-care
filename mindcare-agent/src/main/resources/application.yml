spring:
  application:
    name: mindcare-agent

  datasource:
    url: jdbc:h2:mem:mindcare;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  mail:
    host: localhost
    port: 25

server:
  port: 8080

mindcare:
  mock-model: true

